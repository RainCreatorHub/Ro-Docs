<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Arquivos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main>
        <div id="auth-section">
            <div id="login-container">
                <form id="login-form">
                    <h1>Bem-vindo de volta</h1>
                    <p class="subtitle">Faça login para continuar.</p>
                    <label for="login-email">E-mail</label>
                    <input type="email" id="login-email" placeholder="seu@email.com" required>
                    <label for="login-password">Senha</label>
                    <input type="password" id="login-password" placeholder="Sua senha" required>
                    <button type="submit">Entrar</button>
                    <p class="switch-form-text">Não tem uma conta? <a href="#" id="show-signup">Cadastre-se</a></p>
                </form>
            </div>

            <div id="signup-container" class="hidden">
                <form id="signup-form">
                    <h1>Crie sua Conta</h1>
                    <p class="subtitle">É rápido e fácil.</p>
                    <label for="signup-email">E-mail</label>
                    <input type="email" id="signup-email" placeholder="seu@email.com" required>
                    <label for="signup-password">Senha</label>
                    <input type="password" id="signup-password" placeholder="Crie uma senha forte" required>
                    <button type="submit">Criar Conta</button>
                    <p class="switch-form-text">Já tem uma conta? <a href="#" id="show-login">Faça login</a></p>
                </form>
            </div>
            <div id="auth-status" class="status"></div>
        </div>

        <div id="file-manager-section" class="hidden">
            <div class="header">
                <h1>Seus Arquivos</h1>
                <button id="logout-button">Sair</button>
            </div>
            
            <div class="upload-section">
                <h2>Fazer Novo Upload</h2>
                <label for="file-input">Arquivo (.apk, .apks, .xapk)</label>
                <input type="file" id="file-input" accept=".apk,.apks,.xapk" required>
                <label for="apk-version">Versão</label>
                <input type="text" id="apk-version" placeholder="Ex: 2.1.3" required>
                <label for="apk-description">Descrição</label>
                <textarea id="apk-description" placeholder="Correções de bugs e melhorias de performance." rows="3"></textarea>
                <button id="upload-button">Enviar Arquivo</button>
                <div id="upload-status" class="status"></div>
            </div>

            <div class="download-section">
                <ul id="file-list"></ul>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
